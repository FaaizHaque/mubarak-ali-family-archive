<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Family Tree · Sheikh Mubarak Ali Family Archive</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="tree" class="page-tree">

  <div class="stage" id="stage">
    <div class="world" id="world"><div class="tree" id="tree"></div></div>

    <div class="legend">
      <div class="row"><span class="sw m"></span> Male</div>
      <div class="row"><span class="sw f"></span> Female</div>
      <div class="row"><span class="sw t"></span> To be added</div>
    </div>
    <div class="hintbar">Drag to move · scroll or pinch to zoom · tap a name for their profile</div>
    <div class="controls">
      <button id="zin" title="Zoom in">＋</button>
      <button id="zout" title="Zoom out">－</button>
      <button id="fit" title="Fit to screen" style="font-size:13px">Fit</button>
      <button id="expand" title="Expand all" style="font-size:11px">Expand<br>all</button>
    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/familylib.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/tree.js"></script>
</body>
</html>
